version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bi-dashboard-backend
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://bi_user:bi_password@postgres:5432/bi_dashboard
      DEBUG: "False"
      HOST: 0.0.0.0
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    networks:
      - bi_network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bi-dashboard-postgres
    environment:
      POSTGRES_USER: bi_user
      POSTGRES_PASSWORD: bi_password
      POSTGRES_DB: bi_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    networks:
      - bi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bi_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  bi_network:
    driver: bridge

volumes:
  postgres_data:
